name: verbose-image-build

on:
  workflow_dispatch:

env:
  REGISTRY_IMAGE: sureserver/tor-socat

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-verbose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm/v7
          - linux/arm64
          - linux/riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Prepare platform label
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Build with maximal verbosity
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          log_file="build-${PLATFORM_PAIR}.log"
          docker buildx build \
            --progress=plain \
            --pull \
            --platform "$PLATFORM" \
            --tag "${REGISTRY_IMAGE}:${PLATFORM_PAIR}-verify" \
            . 2>&1 | tee "$log_file"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verbose-build-${{ env.PLATFORM_PAIR }}
          path: build-${{ env.PLATFORM_PAIR }}.log
          if-no-files-found: error
          retention-days: 7
