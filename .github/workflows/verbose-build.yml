name: verbose-image-build

on:
  workflow_dispatch:

env:
  REGISTRY_IMAGE: sureserver/tor-socat

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-verbose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm/v7
          - linux/arm64
          - linux/riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Prepare platform label
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Build with maximal verbosity
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          log_file="build-${PLATFORM_PAIR}.log"
          docker buildx build \
            --progress=plain \
            --pull \
            --platform "$PLATFORM" \
            --tag "${REGISTRY_IMAGE}:${PLATFORM_PAIR}-verify" \
            . 2>&1 | tee "$log_file"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: verbose-build-${{ env.PLATFORM_PAIR }}
          path: build-${{ env.PLATFORM_PAIR }}.log
          if-no-files-found: error
          retention-days: 7
